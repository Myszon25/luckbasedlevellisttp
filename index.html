<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luck Based List</title>

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
    /* ================================== */
    /* THEME VARIABLES (DARK & LIGHT)     */
    /* ================================== */
    :root {
        --bg-color: #020204;
        --card-bg: rgba(12, 12, 18, 0.65);
        --modal-bg: rgba(12, 12, 18, 0.85);
        --accent-1: #9b7bff;
        --accent-2: #00d4ff;
        --accent-pink: #ff4dff;
        --discord: #5865F2;
        --discord-text: #8c94f8;
        
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-border-hover: rgba(255, 255, 255, 0.2);
        --text-main: #ffffff;
        --text-muted: #b3b3b3;
        --nav-bg: rgba(8, 8, 12, 0.6);
        --input-bg: rgba(0, 0, 0, 0.4);
        --input-focus-bg: rgba(0, 0, 0, 0.6);
        --stat-bg: rgba(255, 255, 255, 0.02);
        
        --ambient-opacity: 0.07;
        --ambient-opacity-high: 0.15;
        --card-gradient: linear-gradient(to right, rgba(2,2,4,1) 0%, rgba(2,2,4,0.7) 40%, rgba(2,2,4,0.2) 100%);
        --toast-bg: rgba(20, 20, 30, 0.9);
        --scrollbar-thumb: #1a1a26;
        --empty-border: rgba(255, 255, 255, 0.1);
        --rank-badge-bg: linear-gradient(135deg, #12121c, #1a1a2e);
        --shadow-dark: rgba(0, 0, 0, 0.7);
        --shadow-hover: rgba(0, 0, 0, 0.8);
        --text-shadow: rgba(0, 0, 0, 0.5);
        --skeleton-base: #0f0f15;
        --skeleton-shine: #1a1a24;
        
        --id-bg: rgba(255, 255, 255, 0.05);
        --id-hover: rgba(255, 255, 255, 0.15);
        --wr-hover-bg: white;
        --wr-hover-color: black;
        --play-overlay: rgba(0, 0, 0, 0.4);
        --play-overlay-hover: rgba(0, 0, 0, 0.1);
    }

    [data-theme="light"] {
        --bg-color: #f0f2f5;
        --card-bg: rgba(255, 255, 255, 0.75);
        --modal-bg: rgba(255, 255, 255, 0.9);
        --accent-1: #7848ff;
        --accent-2: #008be5;
        --accent-pink: #d900d9;
        --discord: #5865F2;
        --discord-text: #5865F2;
        
        --glass-border: rgba(0, 0, 0, 0.08);
        --glass-border-hover: rgba(0, 0, 0, 0.2);
        --text-main: #1a1a2e;
        --text-muted: #5a5a75;
        --nav-bg: rgba(255, 255, 255, 0.75);
        --input-bg: rgba(0, 0, 0, 0.05);
        --input-focus-bg: rgba(255, 255, 255, 0.9);
        --stat-bg: rgba(255, 255, 255, 0.5);
        
        --ambient-opacity: 0.12;
        --ambient-opacity-high: 0.25;
        --card-gradient: linear-gradient(to right, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 45%, rgba(255,255,255,0.15) 100%);
        --toast-bg: rgba(255, 255, 255, 0.95);
        --scrollbar-thumb: #c8d0e0;
        --empty-border: rgba(0, 0, 0, 0.15);
        --rank-badge-bg: linear-gradient(135deg, #ffffff, #eef0f5);
        --shadow-dark: rgba(0, 0, 0, 0.08);
        --shadow-hover: rgba(0, 0, 0, 0.12);
        --text-shadow: rgba(255, 255, 255, 0.8);
        --skeleton-base: #e2e5eb;
        --skeleton-shine: #ffffff;
        
        --id-bg: rgba(0, 0, 0, 0.04);
        --id-hover: rgba(0, 0, 0, 0.08);
        --wr-hover-bg: #1a1a2e;
        --wr-hover-color: white;
        --play-overlay: rgba(255, 255, 255, 0.2);
        --play-overlay-hover: rgba(255, 255, 255, 0);
    }

    /* PREMIUM SCROLLBAR */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-1); }

    /* GLOBAL STYLES */
    body {
        margin: 0; background: var(--bg-color); font-family: 'Rubik', sans-serif;
        color: var(--text-main); overflow-x: hidden; padding-top: 150px;
        min-height: 100vh; transition: background-color 0.5s ease, color 0.5s ease;
    }
    body.modal-open { overflow: hidden; } /* Prevents scrolling when modal is open */

    /* SCROLL PROGRESS BAR */
    #scrollProgress { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(to right, var(--accent-pink), var(--accent-1), var(--accent-2)); width: 0%; z-index: 10000; transition: width 0.1s ease-out; }

    /* DEEP SPACE AMBIENT BACKGROUND */
    .ambient-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -2; background: radial-gradient(circle at 15% 25%, rgba(255, 77, 255, var(--ambient-opacity)) 0%, transparent 45%), radial-gradient(circle at 85% 75%, rgba(0, 212, 255, var(--ambient-opacity)) 0%, transparent 45%), radial-gradient(circle at 50% 50%, rgba(155, 123, 255, var(--ambient-opacity)) 0%, transparent 60%); filter: blur(30px); animation: drift 20s ease-in-out infinite alternate; transition: background 0.5s ease; }
    .cursor-glow { position: fixed; top: -150px; left: -150px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(155, 123, 255, var(--ambient-opacity-high)) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: -1; transition: transform 0.15s ease-out; will-change: transform; }
    @keyframes drift { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }

    /* ===================== */
    /* PREMIUM ROUNDED NAV   */
    /* ===================== */
    .navbar { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 999; width: 92%; max-width: 1250px; height: 76px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; border-radius: 100px; background: var(--nav-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--glass-border); box-shadow: 0 25px 50px var(--shadow-dark), inset 0 1px 0 var(--glass-border); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .navbar:hover { box-shadow: 0 30px 60px var(--shadow-hover), 0 0 40px rgba(155, 123, 255, 0.15); transform: translateX(-50%) translateY(-2px); }
    .logo { font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; background: linear-gradient(to right, var(--text-main), var(--accent-pink), var(--accent-2), var(--text-main)); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: moveGradient 6s linear infinite; transition: all 0.3s ease; }
    .right-nav { display: flex; align-items: center; gap: 14px; }
    #searchBar { width: 190px; height: 44px; padding: 0 20px; border-radius: 100px; border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text-main); font-family: inherit; font-weight: 500; outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    #searchBar:focus { width: 250px; background: var(--input-focus-bg); border-color: var(--accent-1); box-shadow: 0 0 25px rgba(155, 123, 255, 0.25); }
    .sort-dropdown { height: 44px; padding: 0 16px; border-radius: 100px; border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text-muted); font-family: inherit; font-weight: 600; font-size: 13px; outline: none; cursor: pointer; transition: all 0.3s; }
    .sort-dropdown:hover { background: var(--id-hover); color: var(--text-main); }
    .sort-dropdown option { background: var(--bg-color); color: var(--text-main); }
    .theme-toggle { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text-main); display: flex; align-items: center; justify-content: center; cursor: pointer; outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .theme-toggle:hover { background: var(--id-hover); transform: translateY(-2px); box-shadow: 0 10px 20px var(--shadow-dark); }
    .theme-toggle svg { width: 20px; height: 20px; stroke: currentColor; transition: transform 0.5s ease; }
    .theme-toggle:active svg { transform: rotate(45deg) scale(0.8); }
    #moonIcon { display: none; } #sunIcon { display: block; }
    [data-theme="light"] #moonIcon { display: block; } [data-theme="light"] #sunIcon { display: none; }
    .btn { height: 44px; padding: 0 24px; border-radius: 100px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 700; font-size: 13px; transition: all 0.3s ease; white-space: nowrap; cursor: pointer; }
    .discord { background: rgba(88, 101, 242, 0.15); color: var(--discord-text); border: 1px solid rgba(88, 101, 242, 0.3); }
    .discord:hover { background: var(--discord); color: white; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(88, 101, 242, 0.4); }

    /* ===================== */
    /* DASHBOARD & FILTERS   */
    /* ===================== */
    .container { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 0 20px 80px 20px; gap: 20px; box-sizing: border-box; }
    .stats-panel { width: min(920px, 95vw); display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .stat-box { background: var(--stat-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 18px 24px; backdrop-filter: blur(10px); transition: all 0.3s; }
    .stat-box:hover { border-color: var(--glass-border-hover); transform: translateY(-2px); box-shadow: 0 10px 30px var(--shadow-dark); }
    .stat-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; transition: color 0.5s; }
    .stat-value { font-size: 24px; font-weight: 900; color: var(--text-main); margin-top: 4px; transition: color 0.5s; }
    .stat-box:nth-child(2) .stat-value { color: var(--accent-2); }
    .filter-wrapper { width: min(920px, 95vw); display: flex; gap: 10px; overflow-x: auto; padding: 5px 0 15px 0; -ms-overflow-style: none; scrollbar-width: none; }
    .filter-wrapper::-webkit-scrollbar { display: none; }
    .filter-btn { padding: 8px 16px; border-radius: 100px; font-size: 12px; font-weight: 700; text-transform: uppercase; background: var(--input-bg); border: 1px solid var(--glass-border); color: var(--text-muted); cursor: pointer; transition: all 0.3s; white-space: nowrap; }
    .filter-btn:hover { background: var(--id-hover); color: var(--text-main); transform: translateY(-1px); }
    .filter-btn.active { background: var(--text-main); color: var(--bg-color); border-color: var(--text-main); box-shadow: 0 5px 15px rgba(255,255,255,0.1); }

    /* ===================== */
    /* ELEGANT CARD LAYOUT   */
    /* ===================== */
    #levelsContainer { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 25px; perspective: 1000px; }
    .card { width: min(920px, 95vw); height: 240px; display: flex; border-radius: 26px; overflow: hidden; background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); box-shadow: 0 20px 45px var(--shadow-dark); position: relative; opacity: 0; transform: translateY(35px); transition: background 0.5s ease, border-color 0.5s ease, box-shadow 0.3s ease, opacity 0.5s ease; transform-style: preserve-3d; }
    @keyframes cardEnter { to { opacity: 1; transform: translateY(0); } }
    .card:hover { border-color: var(--glass-border-hover); box-shadow: 0 30px 60px var(--shadow-hover), 0 0 40px rgba(155, 123, 255, 0.15); z-index: 10; }
    .left { width: 40%; height: 100%; position: relative; cursor: pointer; background: #000; overflow: hidden; flex-shrink: 0; }
    .left img, .right img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    .card:hover .left img, .card:hover .right img { transform: scale(1.06); }
    .left iframe { width: 100%; height: 100%; border: none; }
    .right { width: 60%; height: 100%; position: relative; overflow: hidden; }
    .card-ui-layer { position: absolute; inset: 0; z-index: 2; background: var(--card-gradient); padding: 26px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; transition: background 0.5s ease; }
    
    .play-overlay { position: absolute; inset: 0; background: var(--play-overlay); display: flex; justify-content: center; align-items: center; transition: background 0.3s; }
    .left:hover .play-overlay { background: var(--play-overlay-hover); }
    .play-btn { width: 56px; height: 56px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.4); backdrop-filter: blur(12px); border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .play-btn::after { content: ''; border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-left: 16px solid white; margin-left: 5px; }
    .left:hover .play-btn { transform: scale(1.15); background: white; box-shadow: 0 0 30px rgba(255,255,255,0.6); }
    .left:hover .play-btn::after { border-left-color: black; }

    .ui-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; }
    .title-wrapper { display: flex; align-items: center; gap: 12px; }
    .rank-badge { background: var(--rank-badge-bg); border: 1px solid var(--glass-border); color: var(--accent-1); padding: 4px 12px; border-radius: 10px; font-weight: 900; font-size: 15px; transition: background 0.5s; }
    .title { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; text-shadow: 0 2px 10px var(--text-shadow); transition: text-shadow 0.5s; }
    .sub { font-size: 14px; color: var(--text-muted); margin-top: 8px; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; transition: color 0.5s;}
    .sub b { color: var(--text-main); transition: color 0.5s; }
    .id-copy { cursor: pointer; padding: 2px 6px; border-radius: 6px; background: var(--id-bg); border: 1px solid var(--glass-border); transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px; color: var(--text-main); }
    .id-copy:hover { background: var(--id-hover); }
    .tags-container { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;}
    .tag { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 4px 8px; border-radius: 6px; background: rgba(155, 123, 255, 0.1); color: var(--accent-1); border: 1px solid rgba(155, 123, 255, 0.2); }
    .tag.cyan { background: rgba(0, 212, 255, 0.1); color: var(--accent-2); border-color: rgba(0, 212, 255, 0.2); }
    .chance { font-weight: 900; font-size: 22px; color: var(--accent-2); text-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }

    .ui-bottom { display: flex; justify-content: flex-end; gap: 10px; }
    .action-btn { padding: 8px 20px; border-radius: 12px; background: var(--id-bg); border: 1px solid var(--glass-border); font-size: 13px; font-weight: 700; text-decoration: none; color: var(--text-main); transition: all 0.3s; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .action-btn:hover { background: var(--wr-hover-bg); color: var(--wr-hover-color); transform: translateY(-2px); box-shadow: 0 10px 20px var(--shadow-dark); }
    .action-btn.icon-only { padding: 8px 12px; }

    /* ===================== */
    /* MODAL OVERLAY (NEW)   */
    /* ===================== */
    .modal-overlay {
        position: fixed; inset: 0; z-index: 10000;
        background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px);
        display: flex; justify-content: center; align-items: center;
        opacity: 0; pointer-events: none;
        transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    
    .modal-content {
        width: min(900px, 92vw); max-height: 90vh;
        background: var(--modal-bg); border: 1px solid var(--glass-border);
        border-radius: 26px; box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 50px rgba(155, 123, 255, 0.1);
        display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden;
        transform: scale(0.9) translateY(30px); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }

    /* Modal custom scrollbar */
    .modal-content::-webkit-scrollbar { width: 6px; }
    .modal-content::-webkit-scrollbar-thumb { background: var(--accent-1); border-radius: 10px; }

    .modal-header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 24px 30px; border-bottom: 1px solid var(--glass-border);
        background: rgba(0,0,0,0.1);
    }
    .modal-header-left { display: flex; align-items: center; gap: 15px; }
    .modal-close-btn {
        background: var(--id-bg); border: 1px solid var(--glass-border); color: var(--text-main);
        width: 36px; height: 36px; border-radius: 50%; font-size: 20px; display: flex;
        justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s;
    }
    .modal-close-btn:hover { background: var(--accent-pink); color: white; transform: rotate(90deg); border-color: var(--accent-pink); }

    .modal-video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
    .modal-video-container iframe { width: 100%; height: 100%; border: none; }

    .modal-body { padding: 30px; display: flex; flex-direction: column; gap: 25px; }
    .modal-stats-grid {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;
    }
    .m-stat {
        background: var(--id-bg); border: 1px solid var(--glass-border); border-radius: 16px;
        padding: 16px; display: flex; flex-direction: column; gap: 4px;
    }
    .m-stat-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; }
    .m-stat-val { font-size: 18px; font-weight: 700; color: var(--text-main); }
    .m-stat-val.highlight { color: var(--accent-2); }
    
    .modal-desc {
        font-size: 15px; line-height: 1.6; color: var(--text-muted);
        background: rgba(0,0,0,0.1); padding: 20px; border-radius: 16px; border: 1px dashed var(--glass-border);
    }
    .modal-footer {
        display: flex; justify-content: flex-end; gap: 15px;
        padding: 0 30px 30px 30px;
    }

    /* SKELETON LOADER */
    .skeleton-card { width: min(920px, 95vw); height: 240px; border-radius: 26px; background: var(--skeleton-base); border: 1px solid var(--glass-border); position: relative; overflow: hidden; }
    .skeleton-card::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, var(--skeleton-shine), transparent); transform: translateX(-100%); animation: shimmer 1.5s infinite; opacity: 0.3; }
    @keyframes shimmer { 100% { transform: translateX(100%); } }

    #backToTop { position: fixed; bottom: 30px; left: 30px; width: 50px; height: 50px; border-radius: 50%; background: var(--text-main); color: var(--bg-color); border: none; font-size: 24px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 25px var(--shadow-dark); z-index: 1000; opacity: 0; transform: translateY(20px) scale(0.8); pointer-events: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    #backToTop.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: all; }
    #backToTop:hover { transform: translateY(-5px) scale(1.1); box-shadow: 0 15px 35px rgba(155, 123, 255, 0.4); }

    .toast-container { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 10001; }
    .toast { background: var(--toast-bg); backdrop-filter: blur(10px); border: 1px solid var(--accent-1); color: var(--text-main); padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; box-shadow: 0 10px 30px var(--shadow-dark); transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.5s, color 0.5s; display: flex; align-items: center; gap: 10px; }
    .toast.show { transform: translateX(0); }
    .empty-state { text-align: center; padding: 50px; border: 1px dashed var(--empty-border); border-radius: 20px; color: var(--text-muted); font-weight: 500; display: none; width: min(920px, 95vw); box-sizing: border-box; }

    @media(max-width: 900px) {
        .navbar { flex-direction: column; height: auto; padding: 20px; border-radius: 24px; gap: 15px; top: 12px; width: 94%; }
        .right-nav { flex-wrap: wrap; justify-content: center; width: 100%; gap: 10px; }
        #searchBar { width: 100% !important; }
        .sort-dropdown, .btn, .theme-toggle { width: 100%; }
        .theme-toggle { border-radius: 100px; height: 44px; }
        body { padding-top: 320px; }
        .stats-panel { gap: 12px; width: 94%; }
        .card { flex-direction: column; height: auto; width: 94vw; border-radius: 20px; }
        .left { width: 100%; height: 190px; }
        .right { width: 100%; height: auto; }
        .card-ui-layer { position: relative; padding: 20px; background: var(--bg-color); gap: 20px; }
        .ui-top { flex-direction: column; gap: 12px; }
        .chance { align-self: flex-start; font-size: 20px; }
        .ui-bottom { width: 100%; flex-wrap: wrap; }
        .action-btn { flex: 1; justify-content: center; box-sizing: border-box; }
        .cursor-glow { display: none; }
        #backToTop { bottom: 20px; left: 20px; width: 45px; height: 45px; font-size: 20px;}
        
        .modal-header { padding: 20px; }
        .modal-body { padding: 20px; gap: 20px; }
        .modal-footer { padding: 0 20px 20px 20px; flex-direction: column; }
    }
    @keyframes moveGradient { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
</style>
</head>

<body>

<!-- UI OVERLAYS -->
<div id="scrollProgress"></div>
<div class="ambient-bg"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="toast-container" id="toastBox"></div>
<button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" aria-label="Scroll to top">↑</button>

<!-- LEVEL INFO MODAL -->
<div id="levelModal" class="modal-overlay" onclick="if(event.target === this) closeModal()">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-header-left">
                <div class="rank-badge" id="mRank">#1</div>
                <div class="title" id="mTitle" style="font-size: 22px;">Level Name</div>
            </div>
            <button class="modal-close-btn" onclick="closeModal()">×</button>
        </div>
        
        <div class="modal-video-container" id="mVideoContainer">
            <!-- Iframe injected here via JS -->
        </div>

        <div class="modal-body">
            <div class="modal-stats-grid">
                <div class="m-stat">
                    <span class="m-stat-label">Creator</span>
                    <span class="m-stat-val" id="mAuthor">Unknown</span>
                </div>
                <div class="m-stat">
                    <span class="m-stat-label">Verifier</span>
                    <span class="m-stat-val" id="mVerifier">Unknown</span>
                </div>
                <div class="m-stat">
                    <span class="m-stat-label">Level ID</span>
                    <span class="m-stat-val id-copy" id="mID" onclick="copyData(this.innerText.replace(' 📋',''), 'ID')" style="width: max-content;">12345 📋</span>
                </div>
                <div class="m-stat">
                    <span class="m-stat-label">Success Chance</span>
                    <span class="m-stat-val highlight" id="mChance">0%</span>
                </div>
                <div class="m-stat">
                    <span class="m-stat-label">Length</span>
                    <span class="m-stat-val" id="mLength">-</span>
                </div>
                <div class="m-stat">
                    <span class="m-stat-label">Objects</span>
                    <span class="m-stat-val" id="mObjects">-</span>
                </div>
            </div>

            <div class="modal-desc" id="mDesc">
                No description provided for this level.
            </div>
        </div>

        <div class="modal-footer">
            <a class="action-btn" id="mWRBtn" href="#" target="_blank">🏆 View World Record</a>
            <button class="action-btn" id="mShareBtn" style="background: var(--accent-1); color: white; border-color: var(--accent-1);">🔗 Copy Share Link</button>
        </div>
    </div>
</div>

<!-- NAVIGATION -->
<div class="navbar">
    <div class="logo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">Luck Based List</div>
    <div class="right-nav">
        <input type="text" id="searchBar" placeholder="Search levels...">
        <select id="sortSelect" class="sort-dropdown">
            <option value="place">Sort: Placement</option>
            <option value="chance">Sort: Lowest Chance</option>
            <option value="alpha">Sort: Alphabetical</option>
        </select>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark/Light Mode">
            <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-2.25l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
            <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
        </button>
        <a class="btn theo-btn" href="luckbasedlevellisttp" target="_blank">Technically Possible</a>
        <a class="btn discord" href="https://discord.gg/YfQBH4v23B" target="_blank">Discord</a>
    </div>
</div>

<!-- MAIN DASHBOARD -->
<div class="container">
    <div class="stats-panel">
        <div class="stat-box">
            <div class="stat-label">Total Documented</div>
            <div class="stat-value" id="statTotal">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Hardest Verified</div>
            <div class="stat-value" id="statHardest">-</div>
        </div>
    </div>

    <!-- DYNAMIC FILTER BAR -->
    <div class="filter-wrapper" id="filterWrapper"></div>

    <!-- CARDS RENDER AREA -->
    <div id="levelsContainer"></div>
    <div id="emptyState" class="empty-state">No matches recorded for your specific parameters.</div>
</div>

<script>
// --- STATE MANAGEMENT ---
let levelsData = [];
let currentTagFilter = 'All';

// --- THEME ENGINE ---
const themeToggle = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);

themeToggle.addEventListener('click', () => {
    let currentTheme = document.documentElement.getAttribute('data-theme');
    let newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    showToast(`${newTheme === 'dark' ? 'Dark' : 'Light'} Mode Enabled`);
});

// --- AMBIENT EFFECTS & SCROLL LOGIC ---
const glow = document.getElementById('cursorGlow');
const progressBar = document.getElementById('scrollProgress');
const backToTopBtn = document.getElementById('backToTop');

document.addEventListener('mousemove', (e) => {
    if(window.innerWidth > 900) { glow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`; }
});

window.addEventListener('scroll', () => {
    const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const progress = (scrollTop / scrollHeight) * 100;
    progressBar.style.width = progress + '%';
    if (scrollTop > 400) { backToTopBtn.classList.add('visible'); } else { backToTopBtn.classList.remove('visible'); }
});

// --- TOAST SYSTEM ---
const toastBox = document.getElementById('toastBox');
window.showToast = function(message) {
    let toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<span>✨</span> ${message}`;
    toastBox.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3000);
}

// --- UTILITIES ---
window.copyData = function(text, type) {
    navigator.clipboard.writeText(text).then(() => showToast(`Copied ${type}!`)).catch(err => console.error('Copy failed', err));
}

window.playVideo = function(element, videoId) {
    element.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
    element.style.cursor = 'default';
};

// --- MODAL ENGINE (NEW) ---
const modal = document.getElementById('levelModal');

window.openModal = function(id) {
    const level = levelsData.find(l => String(l.id) === String(id));
    if(!level) return;

    // Populate data
    document.getElementById('mRank').innerText = `#${level.place}`;
    document.getElementById('mTitle').innerText = level.name;
    document.getElementById('mAuthor').innerText = level.author;
    document.getElementById('mVerifier').innerText = level.verifier || level.wrName || 'Unknown';
    document.getElementById('mID').innerHTML = `${level.id} <span style="font-size: 14px">📋</span>`;
    document.getElementById('mChance').innerText = level.chance;
    document.getElementById('mLength').innerText = level.length || 'Unknown';
    document.getElementById('mObjects').innerText = level.objects || 'Unknown';
    document.getElementById('mDesc').innerText = level.description || `An extremely difficult luck-based challenge by ${level.author}. With a ${level.chance} success rate, it stands at #${level.place} on the list.`;
    
    document.getElementById('mWRBtn').href = level.wrLink;
    document.getElementById('mShareBtn').onclick = () => copyData(`Check out ${level.name} (#${level.place})! ID: ${level.id}`, 'Share Text');

    // Setup Video Embed (Autoplays inside modal)
    document.getElementById('mVideoContainer').innerHTML = `<iframe src="https://www.youtube.com/embed/${level.youtube}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;

    // Show modal & lock scroll
    modal.classList.add('active');
    document.body.classList.add('modal-open');
}

window.closeModal = function() {
    modal.classList.remove('active');
    document.body.classList.remove('modal-open');
    // Clear iframe to stop video playing in background
    setTimeout(() => { document.getElementById('mVideoContainer').innerHTML = ''; }, 400);
}

// --- DATA PIPELINE ---
const levelsContainer = document.getElementById("levelsContainer");
const searchBar = document.getElementById("searchBar");
const sortSelect = document.getElementById("sortSelect");
const emptyState = document.getElementById("emptyState");
const filterWrapper = document.getElementById("filterWrapper");

function extractAndRenderTags(data) {
    let tags = new Set(['All']);
    data.forEach(l => l.tags?.forEach(t => tags.add(t)));
    filterWrapper.innerHTML = '';
    tags.forEach(tag => {
        let btn = document.createElement('button');
        btn.className = `filter-btn ${tag === currentTagFilter ? 'active' : ''}`;
        btn.innerText = tag;
        btn.onclick = () => { currentTagFilter = tag; extractAndRenderTags(data); processPipeline(); };
        filterWrapper.appendChild(btn);
    });
}

function runStatisticsCompute(data) {
    if(data.length === 0) return;
    document.getElementById("statTotal").innerText = data.length;
    let hardest = data.reduce((min, l) => l.place < min.place ? l : min, data[0]);
    document.getElementById("statHardest").innerText = hardest ? `#${hardest.place} ${hardest.name}` : "-";
}

function applyTiltEffect() {
    if(window.innerWidth <= 900) return; 
    const cards = document.querySelectorAll('.card');
    cards.forEach(card => {
        card.addEventListener('mousemove', e => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left; const y = e.clientY - rect.top;
            const centerX = rect.width / 2; const centerY = rect.height / 2;
            const rotateX = ((y - centerY) / centerY) * -4; 
            const rotateY = ((x - centerX) / centerX) * 4;
            card.style.transform = `perspective(1000px) translateY(-5px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        card.addEventListener('mouseleave', () => { card.style.transform = `perspective(1000px) translateY(0) rotateX(0deg) rotateY(0deg)`; });
    });
}

function render(data) {
    levelsContainer.innerHTML = "";
    if(data.length === 0) { emptyState.style.display = "block"; return; }
    emptyState.style.display = "none";

    data.forEach((l, index) => {
        let card = document.createElement("div");
        card.className = "card";
        card.style.animation = `cardEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards ${index * 0.08}s`;

        let tagsHTML = "";
        if (l.tags && l.tags.length > 0) {
            tagsHTML = `<div class="tags-container">` + l.tags.map(t => `<div class="tag ${t === 'Verified' ? 'cyan' : ''}">${t}</div>`).join('') + `</div>`;
        }

        card.innerHTML = `
        <div class="left" onclick="playVideo(this, '${l.youtube}')">
            <img src="https://img.youtube.com/vi/${l.youtube}/hqdefault.jpg" alt="Thumbnail" loading="lazy">
            <div class="play-overlay"><div class="play-btn"></div></div>
        </div>
        <div class="right">
            <img src="${l.gif}" alt="Loop" style="position:absolute; inset:0; z-index:1;" loading="lazy">
            <div class="card-ui-layer">
                <div class="ui-top">
                    <div class="text-group">
                        <div class="title-wrapper">
                            <div class="rank-badge">#${l.place}</div>
                            <div class="title">${l.name}</div>
                        </div>
                        <div class="sub">
                            Creator: <b>${l.author}</b> • ID: 
                            <span class="id-copy" onclick="copyData('${l.id}', 'ID')">${l.id} 📋</span>
                        </div>
                        ${tagsHTML}
                    </div>
                    <div class="chance">${l.chance}</div>
                </div>
                <div class="ui-bottom">
                    <!-- NEW INFO BUTTON ADDED HERE -->
                    <button class="action-btn icon-only" onclick="openModal('${l.id}')" aria-label="Detailed Info">👁️ Info</button>
                    <button class="action-btn icon-only" onclick="copyData('Check out ${l.name} (#${l.place})! ID: ${l.id}', 'Info')" aria-label="Share">🔗</button>
                    <a class="action-btn" href="${l.wrLink}" target="_blank">🏆 ${l.wrName}</a>
                </div>
            </div>
        </div>
        `;
        levelsContainer.appendChild(card);
    });
    applyTiltEffect();
}

function renderSkeletons() {
    levelsContainer.innerHTML = "";
    emptyState.style.display = "none";
    for(let i=0; i<3; i++) {
        let skel = document.createElement('div');
        skel.className = 'skeleton-card';
        levelsContainer.appendChild(skel);
    }
}

function processPipeline() {
    let query = searchBar.value.toLowerCase();
    let sortOption = sortSelect.value;
    let filtered = levelsData.filter(l => {
        let matchesSearch = l.name.toLowerCase().includes(query) || l.author.toLowerCase().includes(query) || String(l.id).includes(query);
        let matchesTag = currentTagFilter === 'All' || (l.tags && l.tags.includes(currentTagFilter));
        return matchesSearch && matchesTag;
    });

    if(sortOption === "place") { filtered.sort((a,b) => a.place - b.place); } 
    else if (sortOption === "chance") { filtered.sort((a,b) => parseFloat(a.chance) - parseFloat(b.chance)); } 
    else if (sortOption === "alpha") { filtered.sort((a,b) => a.name.localeCompare(b.name)); }

    renderSkeletons();
    setTimeout(() => { render(filtered); }, 400); 
}

// --- INITIALIZATION ---
// Added expanded extended data fields (description, length, objects, verifier) to demo payload
const demoData = [
    { place: 1, name: "VSC", author: "BoBoBo", verifier: "Paqeo", id: "666666", chance: "0.001%", tags: ["Extreme", "Timings", "Short"], youtube: "dQw4w9WgXcQ", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3VwY2NmdXJvYmdkMDNnbW96ZHZ0b3E0bWN6ZnA1bWxpY3p6bXF6dyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7Tov7edZ6tTuOg8w/giphy.gif", wrLink: "#", wrName: "Paqeo", length: "0m 18s", objects: "14,500", description: "VSC stands as a monument to timing perfection. It requires inhuman consistency over a highly condensed period of time. This level pushed the absolute limits of verification when it was first introduced." },
    { place: 2, name: "Tartarus", author: "Riot & More", verifier: "Dolphy", id: "123456", chance: "0.052%", tags: ["Verified", "Frame Perfect"], youtube: "dQw4w9WgXcQ", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM2VwYm81b3ZkM3JicnpqNDVhcWpxZnNwbTVvNXZpdXp0cHhrNDRxbyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l0HlHFRbmaZtBRhXG/giphy.gif", wrLink: "#", wrName: "Mefewe", length: "1m 58s", objects: "32,109", description: "Once the unquestioned hardest level in the game, Tartarus features incredibly tight straight flying and brutal ship control. A true legendary extreme demon." },
    { place: 3, name: "Acheron", author: "Zoink", verifier: "Zoink", id: "987654", chance: "0.089%", tags: ["Extreme", "Verified"], youtube: "dQw4w9WgXcQ", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3VwY2NmdXJvYmdkMDNnbW96ZHZ0b3E0bWN6ZnA1bWxpY3p6bXF6dyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7Tov7edZ6tTuOg8w/giphy.gif", wrLink: "#", wrName: "Zoink", length: "2m 14s", objects: "44,992", description: "An evolution of the top 1 formula, Acheron features nearly frame-perfect inputs back to back for over two minutes, draining the stamina of even the best players." }
];

fetch("levels.json").then(r => r.json()).then(data => {
    levelsData = data; runStatisticsCompute(levelsData); extractAndRenderTags(levelsData); processPipeline();
}).catch(() => {
    console.warn("levels.json not found, using demo data.");
    levelsData = demoData; runStatisticsCompute(levelsData); extractAndRenderTags(levelsData); processPipeline();
});

// Event Listeners
searchBar.addEventListener("input", processPipeline);
sortSelect.addEventListener("change", processPipeline);
// Escape key closes modal
document.addEventListener('keydown', (e) => {
    if(e.key === "Escape" && modal.classList.contains('active')) closeModal();
});
</script>

</body>
</html>
